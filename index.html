<!DOCTYPE html>
<html>

    <title></title>
    <style>
       /* Forward */
.hvr-forward {
  display: inline-block;
  vertical-align: middle;
  -webkit-transform: perspective(1px) translateZ(0);
  transform: perspective(1px) translateZ(0);
  box-shadow: 0 0 1px rgba(0, 0, 0, 0);
  -webkit-transition-duration: 0.3s;
  transition-duration: 0.3s;
  -webkit-transition-property: transform;
  transition-property: transform;
}
.hvr-forward:hover, .hvr-forward:focus, .hvr-forward:active {
  -webkit-transform: translateX(-8px);
  transform: translateX(-8px);
}


      
      .bodybuttonscapsule{z-index: 98;position:absolute;margin-top:40px;margin-left:150px;width:950px;height:700px;background-color:red;-webkit-border-radius: 0px 0px 20px 50px;border-radius: 0px 0px 20px 50px;}
      .bodymain{z-index: 99;position:absolute;background-color:blue;margin-left:250px;width:750px;height:730px;margin-top:10px;}
      .buttons{padding-left:10px;padding-top:13px;margin-left:40px;position:absolute;width:150px;height:40px;background-color:purple;}
      .face{z-index: 99;position:absolute;width:120px;height:140px;-webkit-border-radius: 100px;border-radius:100px;background-color:green;margin-left:960px;}
      .writing{z-index: 99;width:690px;height:710px;background-color:orange;margin-top:50px;margin:10px;}
      
      
    
    
    </style>
  </head>
